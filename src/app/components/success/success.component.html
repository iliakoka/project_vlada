<div class="success-screen-wrapper">
  <!-- Fullscreen animated stars background -->
  <canvas #starCanvas class="stars-canvas"></canvas>

  <!-- Centered message overlay -->
  <div class="message-overlay page-fade-in">
    <div class="heart-container">
      <svg class="pulsing-heart" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 28.5C16 28.5 3 20.5 3 11.5C3 6.5 7 3.5 11.5 3.5C14.5 3.5 16 5.5 16 5.5C16 5.5 17.5 3.5 20.5 3.5C25 3.5 29 6.5 29 11.5C29 20.5 16 28.5 16 28.5Z" />
      </svg>
      <div class="heart-glow"></div>
    </div>

    <h1 class="success-header">
      Август не может наступить достаточно быстро.
    </h1>
    
    <p class="success-subtext">
      До скорой встречи, Влада.
    </p>

    <!-- Wish Section -->
    <div class="wish-section" [class.submitted]="wishSubmitted">
      <ng-container *ngIf="!wishSubmitted">
        <p class="wish-prompt">Какое у тебя желание на август?</p>
        <div class="wish-input-wrapper">
          <textarea
            class="wish-textarea"
            [(ngModel)]="wishText"
            (input)="onWishInput($event)"
            placeholder="Напиши сюда..."
            rows="3"
            maxlength="300"
            data-clarity-unmask
          ></textarea>
          <!-- Clarity mirror: invisible to user, readable by Clarity session recording -->
          <div class="clarity-text-mirror" data-clarity-unmask="true" aria-hidden="true">{{ wishText }}</div>
          <button
            class="wish-submit-btn"
            [disabled]="!wishText.trim()"
            (click)="submitWish()"
          >
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </ng-container>

      <div class="wish-thanks" *ngIf="wishSubmitted">
        <span class="wish-thanks-icon">🌙</span>
        <p>Пусть август исполнит всё, что ты загадала.</p>
      </div>
    </div>
  </div>
</div>
